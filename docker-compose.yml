# =============================================================================
# RootCauser — SigNoz Observability Stack
# =============================================================================
# Service definitions derived from the official SigNoz Foundry-generated
# Docker Compose output (https://github.com/SigNoz/foundry).
#
# Images pinned to versions current as of July 2026:
#   - clickhouse/clickhouse-server:25.12.5
#   - clickhouse/clickhouse-keeper:25.12.5
#   - postgres:16
#   - signoz/signoz:latest
#   - signoz/signoz-otel-collector:latest
#
# Ports exposed to the host:
#   8080  → SigNoz UI + API
#   4317  → OTLP gRPC ingestion
#   4318  → OTLP HTTP ingestion
#   8000  → Demo Service (order/checkout API)
#
# Prerequisites:
#   - Docker Engine 20.10+ with Compose v2 plugin
#   - At least 4 GB RAM allocated to Docker
#
# Usage:
#   make up      # bring the stack up
#   make down    # tear it down
# =============================================================================

name: rootcauser

networks:
  signoz-network:
    name: signoz-network

volumes:
  signoz-metastore-postgres-0-data:
    name: signoz-metastore-postgres-0-data
  signoz-telemetrykeeper-0-data:
    name: signoz-telemetrykeeper-0-data
  signoz-telemetrystore-0-0-data:
    name: signoz-telemetrystore-0-0-data
  signoz-telemetrystore-user-scripts:
    name: signoz-telemetrystore-user-scripts

services:
  # ---------------------------------------------------------------------------
  # ClickHouse Keeper — consensus / coordination for ClickHouse
  # ---------------------------------------------------------------------------
  signoz-telemetrykeeper-clickhousekeeper-0:
    container_name: signoz-telemetrykeeper-clickhousekeeper-0
    image: clickhouse/clickhouse-keeper:25.12.5
    entrypoint:
      - /usr/bin/clickhouse-keeper
      - --config-file=/etc/clickhouse-keeper/keeper.yaml
    healthcheck:
      test:
        - CMD
        - clickhouse-keeper-client
        - -h
        - localhost
        - -p
        - "9181"
        - -q
        - ls
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - signoz-network
    restart: unless-stopped
    volumes:
      - signoz-telemetrykeeper-0-data:/var/lib/clickhouse-keeper
      - ./signoz-config/telemetrykeeper/clickhousekeeper/keeper-0.yaml:/etc/clickhouse-keeper/keeper.yaml:ro

  # ---------------------------------------------------------------------------
  # ClickHouse user-scripts init — downloads the histogramQuantile UDF binary
  # Runs once (on-failure restart) before ClickHouse server starts.
  # ---------------------------------------------------------------------------
  signoz-telemetrystore-clickhouse-user-scripts:
    container_name: signoz-telemetrystore-clickhouse-user-scripts
    image: clickhouse/clickhouse-server:25.12.5
    command:
      - bash
      - -c
      - |-
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    networks:
      - signoz-network
    restart: on-failure
    volumes:
      - signoz-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts

  # ---------------------------------------------------------------------------
  # ClickHouse Server — telemetry data store (traces, logs, metrics)
  # ---------------------------------------------------------------------------
  signoz-telemetrystore-clickhouse-0-0:
    container_name: signoz-telemetrystore-clickhouse-0-0
    image: clickhouse/clickhouse-server:25.12.5
    depends_on:
      signoz-telemetrykeeper-clickhousekeeper-0:
        condition: service_healthy
      signoz-telemetrystore-clickhouse-user-scripts:
        condition: service_completed_successfully
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
      - CLICKHOUSE_CONFIG=/etc/clickhouse-server/config-0-0.yaml
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8123/ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - signoz-network
    restart: unless-stopped
    volumes:
      - signoz-telemetrystore-0-0-data:/var/lib/clickhouse
      - signoz-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts:ro
      - ./signoz-config/telemetrystore/clickhouse/config-0-0.yaml:/etc/clickhouse-server/config-0-0.yaml:ro
      - ./signoz-config/telemetrystore/clickhouse/functions.yaml:/etc/clickhouse-server/functions.yaml:ro

  # ---------------------------------------------------------------------------
  # PostgreSQL — SigNoz metadata store (users, dashboards, alerts, etc.)
  # ---------------------------------------------------------------------------
  signoz-metastore-postgres-0:
    container_name: signoz-metastore-postgres-0
    image: postgres:16
    environment:
      - POSTGRES_DB=signoz
      - POSTGRES_PASSWORD=signoz
      - POSTGRES_USER=signoz
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U signoz -d signoz
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - signoz-network
    restart: unless-stopped
    volumes:
      - signoz-metastore-postgres-0-data:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # Schema Migrator — runs ClickHouse schema migrations then exits.
  # Must complete before the ingester and SigNoz server can work correctly.
  # ---------------------------------------------------------------------------
  signoz-telemetrystore-migrator:
    container_name: signoz-telemetrystore-migrator
    image: signoz/signoz-otel-collector:latest
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate ready &&
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    depends_on:
      signoz-telemetrystore-clickhouse-0-0:
        condition: service_healthy
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    networks:
      - signoz-network
    restart: on-failure

  # ---------------------------------------------------------------------------
  # SigNoz Ingester (OTel Collector) — receives OTLP data and writes to
  # ClickHouse. Ports 4317 (gRPC) and 4318 (HTTP) are exposed to the host
  # so instrumented services can send telemetry.
  # ---------------------------------------------------------------------------
  signoz-ingester:
    image: signoz/signoz-otel-collector:latest
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/opamp-config.yaml --copy-path=/var/tmp/collector-config.yaml
    depends_on:
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    networks:
      signoz-network:
        aliases:
          - signoz-ingester
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    volumes:
      - ./signoz-config/ingester/ingester.yaml:/etc/otel-collector-config.yaml:ro
      - ./signoz-config/ingester/opamp.yaml:/etc/opamp-config.yaml:ro

  # ---------------------------------------------------------------------------
  # SigNoz Server — unified backend (query-service + frontend UI + alertmanager)
  # served on port 8080. This is the main service RootCauser's copilot-agent
  # will interact with in later steps.
  #
  # Health check hits the /api/v1/health endpoint so downstream services
  # (e.g., copilot-agent) can depend on condition: service_healthy.
  # ---------------------------------------------------------------------------
  signoz-signoz-0:
    container_name: signoz-signoz-0
    image: signoz/signoz:latest
    depends_on:
      signoz-metastore-postgres-0:
        condition: service_healthy
      signoz-telemetrystore-clickhouse-0-0:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    environment:
      - SIGNOZ_SQLSTORE_POSTGRES_DSN=postgres://signoz:signoz@signoz-metastore-postgres-0:5432/signoz?sslmode=disable
      - SIGNOZ_SQLSTORE_PROVIDER=postgres
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
      - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8080/api/v1/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - signoz-network
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives telemetry from application services
  # and forwards it to SigNoz's ingester. Uses the official contrib image.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: rootcauser-otel-collector
    command: ["--config=/etc/otelcol/otel-collector-config.yaml"]
    depends_on:
      signoz-signoz-0:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:13133/
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - signoz-network
    restart: unless-stopped
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro

  # ---------------------------------------------------------------------------
  # Demo Service — fake order/checkout FastAPI app.
  # This is the "target application" that the RootCauser copilot monitors.
  # No OTel instrumentation yet (Step 4) and no bug injection yet (later step).
  # ---------------------------------------------------------------------------
  demo-service:
    build:
      context: ./demo-service
      dockerfile: Dockerfile
    container_name: rootcauser-demo-service
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - signoz-network
    ports:
      - "8000:8000"
    restart: unless-stopped
